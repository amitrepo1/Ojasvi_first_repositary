name: My First GitHub Workflow
# Triggering a fresh build with updated secrets
name: Build and Push Docker Image
...

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A workflow run is made up of one or more jobs
jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Checks-out your repository under $GITHUB_WORKSPACE so your job can access it
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Run a single command using the runners shell
      - name: Run a one-line script
        run: echo "Hello, world! Your automated workflow is running successfully."

      # Step 3: Run a multi-line script
      - name: Run a multi-line script
        run: |
          echo "Current environment path is tracking properly."
          node --version || echo "Node is not strictly required for this test, but the runner works!"
